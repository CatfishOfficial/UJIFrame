<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UJI Core</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background:#0c0c0c; color:#ddd; font-family:'Courier New',Courier,monospace; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:24px; }
  .wrap { max-width:640px; text-align:center; }
  h1 { color:#4CAF50; letter-spacing:0.08em; }
  p { color:#999; line-height:1.6; }
  button { background:none; border:1px solid #4CAF50; color:#4CAF50; font-family:inherit; font-size:14px; padding:10px 22px; border-radius:5px; cursor:pointer; margin-top:18px; }
  button:hover { background:#4CAF50; color:#0c0c0c; }
  code { color:#64B5F6; }

  @keyframes ujiShake {
    10%, 90% { transform: translate(-1px, 0); }
    20%, 80% { transform: translate(2px, -1px); }
    30%, 50%, 70% { transform: translate(-3px, 2px); }
    40%, 60% { transform: translate(3px, -2px); }
  }
  body.uji-shake { animation: ujiShake 0.3s linear; }

  @keyframes ujiComboPop {
    0%   { transform: translate(-50%, -50%) scale(0.3) rotate(-6deg); opacity: 0; }
    25%  { transform: translate(-50%, -50%) scale(1.25) rotate(3deg); opacity: 1; }
    55%  { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.9) translateY(-60px); opacity: 0; }
  }
  .uji-combo-text {
    position: fixed; top: 50%; left: 50%; z-index: 20000; pointer-events: none;
    font-family: 'Courier New', monospace; font-weight: 700; letter-spacing: 0.08em;
    text-shadow: 0 0 14px currentColor, 0 0 28px currentColor;
    animation: ujiComboPop 0.6s ease-out forwards;
    white-space: nowrap;
  }

  @keyframes ujiFlash { 0% { opacity: 0.9; } 100% { opacity: 0; } }
  .uji-flash {
    position: fixed; inset: 0; z-index: 19999; pointer-events: none;
    background: radial-gradient(circle, #fff 0%, transparent 70%);
    animation: ujiFlash 0.5s ease-out forwards;
  }

  @keyframes ujiFinalePop {
    0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
    30%  { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
    60%  { transform: translate(-50%, -50%) scale(1); }
    100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
  }
  .uji-combo-finale {
    font-size: 56px !important;
    animation: ujiFinalePop 1.1s ease-out forwards !important;
    background: linear-gradient(90deg, #ff004c, #ff8800, #ffee00, #5bff5b, #00e5ff, #5b8bff, #b15bff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>UJI Core</h1>
  <p>A portable, no-build-step in-browser admin terminal.<br>
  Drop one file into any page and call <code>UJICore.create({...})</code>.</p>
  <p>Open the console below, or press <code>&uarr;&uarr;&darr;&darr;&larr;&rarr;&larr;&rarr;ba</code> (Konami code) anywhere on this page.</p>
  <button id="launch">Launch Console</button>
  <p>Try: <code>help</code>, <code>about</code>, <code>cowsay hi</code>, <code>matrix</code></p>
</div>

<script src="UJICore.js"></script>
<script>
  const term = UJICore.create({
    appName: 'UJI CORE DEMO',
    titleLabel: 'demo',
    storageKey: 'ujicore_demo_config',
  })

  term.registerCommand('about', {
    help: 'About this demo',
    run: () => term.println('UJI Core — MIT licensed, single-file admin console. https://github.com/CatfishOfficial/UJIFrame'),
  })

  document.getElementById('launch').addEventListener('click', () => term.open())

  // ── Konami combo effect ──────────────────────────────────────────────
  // Purely cosmetic, page-level feedback for each correct step of the
  // Konami code. UJICore.js tracks the same sequence independently and
  // owns the actual "open the console" trigger.
  const KONAMI_DEMO = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a']
  const KONAMI_LABELS = { ArrowUp: '↑', ArrowDown: '↓', ArrowLeft: '←', ArrowRight: '→', b: 'B', a: 'A' }
  const COMBO_COLORS = ['#ff004c', '#ff8800', '#ffee00', '#5bff5b', '#00e5ff', '#5b8bff', '#b15bff', '#ff5bd6', '#ff5b5b', '#ffffff']
  let comboIdx = 0

  function popText(text, className, color, size) {
    const el = document.createElement('div')
    el.className = className
    if (color) el.style.color = color
    if (size) el.style.fontSize = size + 'px'
    el.textContent = text
    document.body.appendChild(el)
    el.addEventListener('animationend', () => el.remove())
  }

  function shakeScreen() {
    document.body.classList.remove('uji-shake')
    void document.body.offsetWidth // force reflow so the animation restarts mid-combo
    document.body.classList.add('uji-shake')
  }

  function showFinale() {
    popText('KONAMI CODE!', 'uji-combo-text uji-combo-finale')
    const flash = document.createElement('div')
    flash.className = 'uji-flash'
    document.body.appendChild(flash)
    flash.addEventListener('animationend', () => flash.remove())
    shakeScreen()
  }

  document.addEventListener('keydown', (e) => {
    const panel = document.getElementById('tf-console')
    if (panel && panel.classList.contains('open')) return // don't fire while the real terminal has focus

    if (e.key === KONAMI_DEMO[comboIdx]) {
      comboIdx++
      const label = KONAMI_LABELS[e.key] || e.key
      const color = COMBO_COLORS[(comboIdx - 1) % COMBO_COLORS.length]
      popText(`${label}  COMBO x${comboIdx}`, 'uji-combo-text', color, 24 + comboIdx * 4)
      shakeScreen()
      if (comboIdx === KONAMI_DEMO.length) {
        comboIdx = 0
        showFinale()
      }
    } else {
      comboIdx = e.key === KONAMI_DEMO[0] ? 1 : 0
    }
  })
</script>
</body>
</html>
